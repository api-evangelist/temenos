naftiko: 1.0.0-alpha2
info:
  label: Temenos Journey Manager API — Tasks
  description: 'Temenos Journey Manager API — Tasks. 1 operations. Lead operation: List Tasks. Self-contained Naftiko capability
    covering one Temenos business surface.'
  tags:
  - Temenos
  - Tasks
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    TEMENOS_API_KEY: TEMENOS_API_KEY
capability:
  consumes:
  - type: http
    namespace: journey-manager-tasks
    baseUri: https://journey.temenos.com/api/v1
    description: Temenos Journey Manager API — Tasks business capability. Self-contained, no shared references.
    resources:
    - name: tasks
      path: /tasks
      operations:
      - name: listtasks
        method: GET
        description: List Tasks
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: assignee
          in: query
          type: string
          description: Filter by assigned user
        - name: status
          in: query
          type: string
          description: Filter by task status
    authentication:
      type: bearer
      token: '{{env.TEMENOS_API_KEY}}'
  exposes:
  - type: rest
    namespace: journey-manager-tasks-rest
    port: 8080
    description: REST adapter for Temenos Journey Manager API — Tasks. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/tasks
      name: tasks
      description: REST surface for tasks.
      operations:
      - method: GET
        name: listtasks
        description: List Tasks
        call: journey-manager-tasks.listtasks
        with:
          assignee: rest.assignee
          status: rest.status
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: journey-manager-tasks-mcp
    port: 9090
    transport: http
    description: MCP adapter for Temenos Journey Manager API — Tasks. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: list-tasks
      description: List Tasks
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: journey-manager-tasks.listtasks
      with:
        assignee: tools.assignee
        status: tools.status
      outputParameters:
      - type: object
        mapping: $.

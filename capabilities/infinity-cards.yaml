naftiko: 1.0.0-alpha2
info:
  label: Temenos Infinity Digital Banking API — Cards
  description: 'Temenos Infinity Digital Banking API — Cards. 2 operations. Lead operation: List Customer Cards. Self-contained
    Naftiko capability covering one Temenos business surface.'
  tags:
  - Temenos
  - Cards
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    TEMENOS_API_KEY: TEMENOS_API_KEY
capability:
  consumes:
  - type: http
    namespace: infinity-cards
    baseUri: https://api.temenos.com/infinity/v1
    description: Temenos Infinity Digital Banking API — Cards business capability. Self-contained, no shared references.
    resources:
    - name: cards
      path: /cards
      operations:
      - name: listcards
        method: GET
        description: List Customer Cards
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: cards-cardId
      path: /cards/{cardId}
      operations:
      - name: updatecardcontrols
        method: PUT
        description: Update Card Controls
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: cardId
          in: path
          type: string
          description: Unique card identifier
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.TEMENOS_API_KEY}}'
  exposes:
  - type: rest
    namespace: infinity-cards-rest
    port: 8080
    description: REST adapter for Temenos Infinity Digital Banking API — Cards. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/cards
      name: cards
      description: REST surface for cards.
      operations:
      - method: GET
        name: listcards
        description: List Customer Cards
        call: infinity-cards.listcards
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/cards/{cardid}
      name: cards-cardid
      description: REST surface for cards-cardId.
      operations:
      - method: PUT
        name: updatecardcontrols
        description: Update Card Controls
        call: infinity-cards.updatecardcontrols
        with:
          cardId: rest.cardId
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: infinity-cards-mcp
    port: 9090
    transport: http
    description: MCP adapter for Temenos Infinity Digital Banking API — Cards. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: list-customer-cards
      description: List Customer Cards
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: infinity-cards.listcards
      outputParameters:
      - type: object
        mapping: $.
    - name: update-card-controls
      description: Update Card Controls
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: infinity-cards.updatecardcontrols
      with:
        cardId: tools.cardId
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.

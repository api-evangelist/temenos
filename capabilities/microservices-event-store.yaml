naftiko: 1.0.0-alpha2
info:
  label: Temenos Transact Microservices API — Event Store
  description: 'Temenos Transact Microservices API — Event Store. 2 operations. Lead operation: List Events. Self-contained
    Naftiko capability covering one Temenos business surface.'
  tags:
  - Temenos
  - Event Store
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    TEMENOS_API_KEY: TEMENOS_API_KEY
capability:
  consumes:
  - type: http
    namespace: microservices-event-store
    baseUri: https://api.temenos.com/transact/microservices/v1
    description: Temenos Transact Microservices API — Event Store business capability. Self-contained, no shared references.
    resources:
    - name: events
      path: /events
      operations:
      - name: listevents
        method: GET
        description: List Events
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: eventType
          in: query
          type: string
          description: Filter by event type
        - name: source
          in: query
          type: string
          description: Filter by event source
        - name: dateFrom
          in: query
          type: string
          description: Start date filter
        - name: dateTo
          in: query
          type: string
          description: End date filter
    - name: events-eventId
      path: /events/{eventId}
      operations:
      - name: getevent
        method: GET
        description: Get Event Details
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: eventId
          in: path
          type: string
          description: Event identifier
          required: true
    authentication:
      type: bearer
      token: '{{env.TEMENOS_API_KEY}}'
  exposes:
  - type: rest
    namespace: microservices-event-store-rest
    port: 8080
    description: REST adapter for Temenos Transact Microservices API — Event Store. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/events
      name: events
      description: REST surface for events.
      operations:
      - method: GET
        name: listevents
        description: List Events
        call: microservices-event-store.listevents
        with:
          eventType: rest.eventType
          source: rest.source
          dateFrom: rest.dateFrom
          dateTo: rest.dateTo
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/events/{eventid}
      name: events-eventid
      description: REST surface for events-eventId.
      operations:
      - method: GET
        name: getevent
        description: Get Event Details
        call: microservices-event-store.getevent
        with:
          eventId: rest.eventId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: microservices-event-store-mcp
    port: 9090
    transport: http
    description: MCP adapter for Temenos Transact Microservices API — Event Store. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: list-events
      description: List Events
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: microservices-event-store.listevents
      with:
        eventType: tools.eventType
        source: tools.source
        dateFrom: tools.dateFrom
        dateTo: tools.dateTo
      outputParameters:
      - type: object
        mapping: $.
    - name: get-event-details
      description: Get Event Details
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: microservices-event-store.getevent
      with:
        eventId: tools.eventId
      outputParameters:
      - type: object
        mapping: $.

naftiko: 1.0.0-alpha2
info:
  label: Temenos Journey Manager API — Transactions
  description: 'Temenos Journey Manager API — Transactions. 1 operations. Lead operation: List Transactions. Self-contained
    Naftiko capability covering one Temenos business surface.'
  tags:
  - Temenos
  - Transactions
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    TEMENOS_API_KEY: TEMENOS_API_KEY
capability:
  consumes:
  - type: http
    namespace: journey-manager-transactions
    baseUri: https://journey.temenos.com/api/v1
    description: Temenos Journey Manager API — Transactions business capability. Self-contained, no shared references.
    resources:
    - name: transactions
      path: /transactions
      operations:
      - name: listtransactions
        method: GET
        description: List Transactions
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: status
          in: query
          type: string
          description: Filter by transaction status
    authentication:
      type: bearer
      token: '{{env.TEMENOS_API_KEY}}'
  exposes:
  - type: rest
    namespace: journey-manager-transactions-rest
    port: 8080
    description: REST adapter for Temenos Journey Manager API — Transactions. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/transactions
      name: transactions
      description: REST surface for transactions.
      operations:
      - method: GET
        name: listtransactions
        description: List Transactions
        call: journey-manager-transactions.listtransactions
        with:
          status: rest.status
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: journey-manager-transactions-mcp
    port: 9090
    transport: http
    description: MCP adapter for Temenos Journey Manager API — Transactions. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: list-transactions
      description: List Transactions
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: journey-manager-transactions.listtransactions
      with:
        status: tools.status
      outputParameters:
      - type: object
        mapping: $.

naftiko: 1.0.0-alpha2
info:
  label: Temenos Cloud Banking (CMB) API — Deposits
  description: 'Temenos Cloud Banking (CMB) API — Deposits. 1 operations. Lead operation: List Deposits. Self-contained Naftiko
    capability covering one Temenos business surface.'
  tags:
  - Temenos
  - Deposits
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    TEMENOS_API_KEY: TEMENOS_API_KEY
capability:
  consumes:
  - type: http
    namespace: cloud-banking-deposits
    baseUri: https://api.temenos.com/cmb/v1
    description: Temenos Cloud Banking (CMB) API — Deposits business capability. Self-contained, no shared references.
    resources:
    - name: deposits
      path: /deposits
      operations:
      - name: listcmbdeposits
        method: GET
        description: List Deposits
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.TEMENOS_API_KEY}}'
  exposes:
  - type: rest
    namespace: cloud-banking-deposits-rest
    port: 8080
    description: REST adapter for Temenos Cloud Banking (CMB) API — Deposits. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/deposits
      name: deposits
      description: REST surface for deposits.
      operations:
      - method: GET
        name: listcmbdeposits
        description: List Deposits
        call: cloud-banking-deposits.listcmbdeposits
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: cloud-banking-deposits-mcp
    port: 9090
    transport: http
    description: MCP adapter for Temenos Cloud Banking (CMB) API — Deposits. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: list-deposits
      description: List Deposits
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: cloud-banking-deposits.listcmbdeposits
      outputParameters:
      - type: object
        mapping: $.

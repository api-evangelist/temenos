naftiko: 1.0.0-alpha2
info:
  label: Temenos Transact API — Party
  description: 'Temenos Transact API — Party. 5 operations. Lead operation: List Beneficiaries. Self-contained Naftiko capability
    covering one Temenos business surface.'
  tags:
  - Temenos
  - Party
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    TEMENOS_API_KEY: TEMENOS_API_KEY
capability:
  consumes:
  - type: http
    namespace: transact-party
    baseUri: https://api.temenos.com/transact/v1
    description: Temenos Transact API — Party business capability. Self-contained, no shared references.
    resources:
    - name: party-beneficiaries
      path: /party/beneficiaries
      operations:
      - name: listbeneficiaries
        method: GET
        description: List Beneficiaries
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: customerId
          in: query
          type: string
          description: Filter beneficiaries by customer
    - name: party-customers
      path: /party/customers
      operations:
      - name: listcustomers
        method: GET
        description: List Customers
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: customerType
          in: query
          type: string
          description: Filter by customer type
      - name: createcustomer
        method: POST
        description: Create Customer
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: party-customers-customerId
      path: /party/customers/{customerId}
      operations:
      - name: getcustomer
        method: GET
        description: Get Customer Details
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updatecustomer
        method: PUT
        description: Update Customer Details
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.TEMENOS_API_KEY}}'
  exposes:
  - type: rest
    namespace: transact-party-rest
    port: 8080
    description: REST adapter for Temenos Transact API — Party. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/party/beneficiaries
      name: party-beneficiaries
      description: REST surface for party-beneficiaries.
      operations:
      - method: GET
        name: listbeneficiaries
        description: List Beneficiaries
        call: transact-party.listbeneficiaries
        with:
          customerId: rest.customerId
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/party/customers
      name: party-customers
      description: REST surface for party-customers.
      operations:
      - method: GET
        name: listcustomers
        description: List Customers
        call: transact-party.listcustomers
        with:
          customerType: rest.customerType
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createcustomer
        description: Create Customer
        call: transact-party.createcustomer
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/party/customers/{customerid}
      name: party-customers-customerid
      description: REST surface for party-customers-customerId.
      operations:
      - method: GET
        name: getcustomer
        description: Get Customer Details
        call: transact-party.getcustomer
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: updatecustomer
        description: Update Customer Details
        call: transact-party.updatecustomer
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: transact-party-mcp
    port: 9090
    transport: http
    description: MCP adapter for Temenos Transact API — Party. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: list-beneficiaries
      description: List Beneficiaries
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: transact-party.listbeneficiaries
      with:
        customerId: tools.customerId
      outputParameters:
      - type: object
        mapping: $.
    - name: list-customers
      description: List Customers
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: transact-party.listcustomers
      with:
        customerType: tools.customerType
      outputParameters:
      - type: object
        mapping: $.
    - name: create-customer
      description: Create Customer
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: transact-party.createcustomer
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-customer-details
      description: Get Customer Details
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: transact-party.getcustomer
      outputParameters:
      - type: object
        mapping: $.
    - name: update-customer-details
      description: Update Customer Details
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: transact-party.updatecustomer
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.

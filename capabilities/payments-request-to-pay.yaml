naftiko: 1.0.0-alpha2
info:
  label: Temenos Payments API — Request to Pay
  description: 'Temenos Payments API — Request to Pay. 2 operations. Lead operation: List Request-to-pay Messages. Self-contained
    Naftiko capability covering one Temenos business surface.'
  tags:
  - Temenos
  - Request to Pay
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    TEMENOS_API_KEY: TEMENOS_API_KEY
capability:
  consumes:
  - type: http
    namespace: payments-request-to-pay
    baseUri: https://api.temenos.com/payments/v1
    description: Temenos Payments API — Request to Pay business capability. Self-contained, no shared references.
    resources:
    - name: requestToPay
      path: /requestToPay
      operations:
      - name: listrequesttopay
        method: GET
        description: List Request-to-pay Messages
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: direction
          in: query
          type: string
          description: Filter by request direction
      - name: createrequesttopay
        method: POST
        description: Create Request-to-pay
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.TEMENOS_API_KEY}}'
  exposes:
  - type: rest
    namespace: payments-request-to-pay-rest
    port: 8080
    description: REST adapter for Temenos Payments API — Request to Pay. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/requesttopay
      name: requesttopay
      description: REST surface for requestToPay.
      operations:
      - method: GET
        name: listrequesttopay
        description: List Request-to-pay Messages
        call: payments-request-to-pay.listrequesttopay
        with:
          direction: rest.direction
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createrequesttopay
        description: Create Request-to-pay
        call: payments-request-to-pay.createrequesttopay
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: payments-request-to-pay-mcp
    port: 9090
    transport: http
    description: MCP adapter for Temenos Payments API — Request to Pay. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: list-request-pay-messages
      description: List Request-to-pay Messages
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: payments-request-to-pay.listrequesttopay
      with:
        direction: tools.direction
      outputParameters:
      - type: object
        mapping: $.
    - name: create-request-pay
      description: Create Request-to-pay
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: payments-request-to-pay.createrequesttopay
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.

naftiko: 1.0.0-alpha2
info:
  label: Temenos Transact Microservices API — Entitlements
  description: 'Temenos Transact Microservices API — Entitlements. 2 operations. Lead operation: List User Entitlements. Self-contained
    Naftiko capability covering one Temenos business surface.'
  tags:
  - Temenos
  - Entitlements
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    TEMENOS_API_KEY: TEMENOS_API_KEY
capability:
  consumes:
  - type: http
    namespace: microservices-entitlements
    baseUri: https://api.temenos.com/transact/microservices/v1
    description: Temenos Transact Microservices API — Entitlements business capability. Self-contained, no shared references.
    resources:
    - name: entitlements
      path: /entitlements
      operations:
      - name: listentitlements
        method: GET
        description: List User Entitlements
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: userId
          in: query
          type: string
          description: Filter by user identifier
        - name: productId
          in: query
          type: string
          description: Filter by product identifier
      - name: createentitlement
        method: POST
        description: Assign Entitlement
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.TEMENOS_API_KEY}}'
  exposes:
  - type: rest
    namespace: microservices-entitlements-rest
    port: 8080
    description: REST adapter for Temenos Transact Microservices API — Entitlements. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/entitlements
      name: entitlements
      description: REST surface for entitlements.
      operations:
      - method: GET
        name: listentitlements
        description: List User Entitlements
        call: microservices-entitlements.listentitlements
        with:
          userId: rest.userId
          productId: rest.productId
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createentitlement
        description: Assign Entitlement
        call: microservices-entitlements.createentitlement
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: microservices-entitlements-mcp
    port: 9090
    transport: http
    description: MCP adapter for Temenos Transact Microservices API — Entitlements. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: list-user-entitlements
      description: List User Entitlements
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: microservices-entitlements.listentitlements
      with:
        userId: tools.userId
        productId: tools.productId
      outputParameters:
      - type: object
        mapping: $.
    - name: assign-entitlement
      description: Assign Entitlement
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: microservices-entitlements.createentitlement
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.

naftiko: 1.0.0-alpha2
info:
  label: Temenos Enterprise Product and Pricing API — Pricing Arrangement Details
  description: 'Temenos Enterprise Product and Pricing API — Pricing Arrangement Details. 2 operations. Lead operation: Get
    Arrangement Charges. Self-contained Naftiko capability covering one Temenos business surface.'
  tags:

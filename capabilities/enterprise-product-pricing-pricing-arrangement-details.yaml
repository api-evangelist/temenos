    resources:
    - name: arrangements-arrangementId-charges
      path: /arrangements/{arrangementId}/charges
      operations:
      - name: getarrangementcharges
        method: GET
        description: Get Arrangement Charges
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: arrangementId
          in: path
          type: string
          description: Arrangement identifier
          required: true
    - name: arrangements-arrangementId-interestRates
      path: /arrangements/{arrangementId}/interestRates
      operations:
      - name: getarrangementinterestrates
        method: GET
        description: Get Arrangement Interest Rates
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.

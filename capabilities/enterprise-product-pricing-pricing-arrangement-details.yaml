    namespace: enterprise-product-pricing-pricing-arrangement-details-rest
    port: 8080
    description: REST adapter for Temenos Enterprise Product and Pricing API — Pricing Arrangement Details. One Spectral-compliant
      resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/arrangements/{arrangementid}/charges
      name: arrangements-arrangementid-charges
      description: REST surface for arrangements-arrangementId-charges.
      operations:
      - method: GET
        name: getarrangementcharges
        description: Get Arrangement Charges
        call: enterprise-product-pricing-pricing-arrangement-details.getarrangementcharges
        with:
          arrangementId: rest.arrangementId
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/arrangements/{arrangementid}/interestrates
      name: arrangements-arrangementid-interestrates
      description: REST surface for arrangements-arrangementId-interestRates.
      operations:
      - method: GET
        name: getarrangementinterestrates
        description: Get Arrangement Interest Rates
        call: enterprise-product-pricing-pricing-arrangement-details.getarrangementinterestrates
        with:
          arrangementId: rest.arrangementId
        outputParameters:
        - type: object
          mapping: $.

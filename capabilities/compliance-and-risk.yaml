naftiko: 1.0.0-alpha2
info:
  label: Temenos Compliance And Risk
  description: Compliance and financial crime management workflow combining Financial Crime Mitigation and core Transact APIs.
    Used by compliance officers, AML analysts, and risk teams to screen customers, monitor transactions, and manage regulatory
    risk.
  tags:
  - Compliance
  - AML
  - Risk Management
  - KYC
  - Sanctions Screening
  - Financial Crime
  - Banking
  created: '2026-05-03'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    TEMENOS_FCM_TOKEN: TEMENOS_FCM_TOKEN
    TEMENOS_TRANSACT_TOKEN: TEMENOS_TRANSACT_TOKEN
capability:
  consumes:
  - type: http
    namespace: fcm
    baseUri: https://api.temenos.com/fcm/v1
    description: Temenos Financial Crime Mitigation API
    authentication:
      type: bearer
      token: '{{TEMENOS_FCM_TOKEN}}'
    resources:
    - name: risk-scores
      path: /customers/{customerId}/riskScore
      description: Customer risk scoring
      operations:
      - name: get-customer-risk-score
        method: GET
        description: Get customer risk score
        inputParameters:
        - name: customerId
          in: path
          type: string
          required: true
          description: Customer identifier
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: compute-customer-risk-score
        method: POST
        description: Compute updated customer risk score
        inputParameters:
        - name: customerId
          in: path
          type: string
          required: true
          description: Customer identifier
        body:
          type: json
          data:
            scoreType: '{{tools.scoreType}}'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: sanction-alerts
      path: /customers/{customerId}/sanctionAlerts
      description: Sanction screening alerts
      operations:
      - name: get-customer-sanction-alerts
        method: GET
        description: Get sanction alerts for a customer
        inputParameters:
        - name: customerId
          in: path
          type: string
          required: true
          description: Customer identifier
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: all-sanction-alerts
      path: /sanctionAlerts
      description: All sanction alerts
      operations:
      - name: list-all-sanction-alerts
        method: GET
        description: List all sanctions alerts across customers
        inputParameters:
        - name: page_size
          in: query
          type: integer
          required: false
          description: Records per page
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: onboarding-screening
      path: /screenings/onboarding
      description: Onboarding KYC screening
      operations:
      - name: screen-onboarding-customer
        method: POST
        description: Screen a customer during onboarding
        body:
          type: json
          data:
            customerId: '{{tools.customerId}}'
            checkTypes: '{{tools.checkTypes}}'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: transaction-scanning
      path: /transactions/scan
      description: Transaction message scanning
      operations:
      - name: scan-transaction-message
        method: POST
        description: Scan a transaction message for AML indicators
        body:
          type: json
          data:
            transactionId: '{{tools.transactionId}}'
            message: '{{tools.message}}'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: monitoring-alerts
      path: /alerts
      description: Transaction monitoring alerts
      operations:
      - name: list-monitoring-alerts
        method: GET
        description: List transaction monitoring alerts
        inputParameters:
        - name: page_size
          in: query
          type: integer
          required: false
          description: Records per page
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: get-alert
        method: GET
        description: Get monitoring alert details
        inputParameters:
        - name: alertId
          in: path
          type: string
          required: true
          description: Alert identifier
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: update-alert
        method: PUT
        description: Update alert status or resolution
        inputParameters:
        - name: alertId
          in: path
          type: string
          required: true
          description: Alert identifier
        body:
          type: json
          data:
            status: '{{tools.status}}'
            resolution: '{{tools.resolution}}'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  - type: http
    namespace: transact
    baseUri: https://api.temenos.com/transact/v1
    description: Temenos Transact core banking API
    authentication:
      type: bearer
      token: '{{TEMENOS_TRANSACT_TOKEN}}'
    resources:
    - name: accounts
      path: /holdings/accounts
      description: Customer account arrangements
      operations:
      - name: list-accounts
        method: GET
        description: List customer accounts with optional filtering
        inputParameters:
        - name: customerId
          in: query
          type: string
          required: false
          description: Filter accounts by customer identifier
        - name: accountType
          in: query
          type: string
          required: false
          description: Filter by account type (CURRENT, SAVINGS, DEPOSIT, LOAN)
        - name: page_size
          in: query
          type: integer
          required: false
          description: Number of records per page
        - name: page_start
          in: query
          type: integer
          required: false
          description: Starting record number
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-account
        method: POST
        description: Create a new account arrangement
        body:
          type: json
          data:
            customerId: '{{tools.customerId}}'
            accountType: '{{tools.accountType}}'
            currency: '{{tools.currency}}'
            productId: '{{tools.productId}}'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: account-detail
      path: /holdings/accounts/{accountId}
      description: Single account operations
      operations:
      - name: get-account
        method: GET
        description: Get account details
        inputParameters:
        - name: accountId
          in: path
          type: string
          required: true
          description: Unique account identifier
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: update-account
        method: PUT
        description: Update account arrangement
        inputParameters:
        - name: accountId
          in: path
          type: string
          required: true
          description: Unique account identifier
        body:
          type: json
          data:
            status: '{{tools.status}}'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: account-balances
      path: /holdings/accounts/{accountId}/balances
      description: Account balance information
      operations:
      - name: get-account-balances
        method: GET
        description: Get account balances
        inputParameters:
        - name: accountId
          in: path
          type: string
          required: true
          description: Unique account identifier
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: account-transactions
      path: /holdings/accounts/{accountId}/transactions
      description: Account transaction history
      operations:
      - name: list-account-transactions
        method: GET
        description: List account transactions
        inputParameters:
        - name: accountId
          in: path
          type: string
          required: true
          description: Unique account identifier
        - name: page_size
          in: query
          type: integer
          required: false
          description: Records per page
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: customers
      path: /party/customers
      description: Customer management
      operations:
      - name: list-customers
        method: GET
        description: List customers
        inputParameters:
        - name: page_size
          in: query
          type: integer
          required: false
          description: Records per page
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-customer
        method: POST
        description: Create new customer
        body:
          type: json
          data:
            firstName: '{{tools.firstName}}'
            lastName: '{{tools.lastName}}'
            customerType: '{{tools.customerType}}'
            email: '{{tools.email}}'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: customer-detail
      path: /party/customers/{customerId}
      description: Single customer operations
      operations:
      - name: get-customer
        method: GET
        description: Get customer details
        inputParameters:
        - name: customerId
          in: path
          type: string
          required: true
          description: Unique customer identifier
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: payment-orders
      path: /order/paymentOrders
      description: Payment order management
      operations:
      - name: list-payment-orders
        method: GET
        description: List payment orders
        inputParameters:
        - name: page_size
          in: query
          type: integer
          required: false
          description: Records per page
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-payment-order
        method: POST
        description: Create payment order
        body:
          type: json
          data:
            debitAccountId: '{{tools.debitAccountId}}'
            creditAccountId: '{{tools.creditAccountId}}'
            amount: '{{tools.amount}}'
            currency: '{{tools.currency}}'
            paymentType: '{{tools.paymentType}}'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    port: 8081
    namespace: compliance-risk-api
    description: Unified REST API for Temenos compliance and risk management.
    resources:
    - path: /v1/customers/{customerId}/risk-score
      name: risk-score
      description: Customer risk scoring
      operations:
      - method: GET
        name: get-risk-score
        description: Get customer AML risk score
        call: fcm.get-customer-risk-score
        with:
          customerId: rest.customerId
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: compute-risk-score
        description: Compute updated customer risk score
        call: fcm.compute-customer-risk-score
        with:
          customerId: rest.customerId
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/customers/{customerId}/sanction-alerts
      name: sanction-alerts
      description: Customer sanction screening alerts
      operations:
      - method: GET
        name: get-sanction-alerts
        description: Get sanctions alerts for a customer
        call: fcm.get-customer-sanction-alerts
        with:
          customerId: rest.customerId
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/sanction-alerts
      name: all-sanction-alerts
      description: All sanction screening alerts
      operations:
      - method: GET
        name: list-sanction-alerts
        description: List all sanctions alerts
        call: fcm.list-all-sanction-alerts
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/screenings/onboarding
      name: onboarding-screening
      description: Onboarding KYC screening
      operations:
      - method: POST
        name: screen-customer
        description: Screen a customer for onboarding compliance
        call: fcm.screen-onboarding-customer
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/transactions/scan
      name: transaction-scanning
      description: Transaction AML scanning
      operations:
      - method: POST
        name: scan-transaction
        description: Scan a transaction for AML indicators
        call: fcm.scan-transaction-message
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/monitoring-alerts
      name: monitoring-alerts
      description: Transaction monitoring alerts
      operations:
      - method: GET
        name: list-alerts
        description: List transaction monitoring alerts
        call: fcm.list-monitoring-alerts
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/monitoring-alerts/{alertId}
      name: alert-detail
      description: Single monitoring alert
      operations:
      - method: GET
        name: get-alert
        description: Get alert details
        call: fcm.get-alert
        with:
          alertId: rest.alertId
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: update-alert
        description: Update alert status or resolution
        call: fcm.update-alert
        with:
          alertId: rest.alertId
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/customers
      name: customers
      description: Customer lookups for compliance context
      operations:
      - method: GET
        name: get-customer
        description: Get customer details for compliance review
        call: transact.get-customer
        with:
          customerId: rest.customerId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9091
    namespace: compliance-risk-mcp
    transport: http
    description: MCP server for AI-assisted compliance and financial crime management.
    tools:
    - name: get-customer-risk-score
      description: Get AML risk score for a customer
      hints:
        readOnly: true
        openWorld: false
      call: fcm.get-customer-risk-score
      with:
        customerId: tools.customerId
      outputParameters:
      - type: object
        mapping: $.
    - name: compute-customer-risk-score
      description: Compute and refresh a customer risk score
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: fcm.compute-customer-risk-score
      with:
        customerId: tools.customerId
      outputParameters:
      - type: object
        mapping: $.
    - name: screen-onboarding-customer
      description: Run full KYC and sanctions screening for a new customer
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: fcm.screen-onboarding-customer
      outputParameters:
      - type: object
        mapping: $.
    - name: get-customer-sanction-alerts
      description: Get sanctions screening alerts for a specific customer
      hints:
        readOnly: true
        openWorld: false
      call: fcm.get-customer-sanction-alerts
      with:
        customerId: tools.customerId
      outputParameters:
      - type: object
        mapping: $.
    - name: list-sanction-alerts
      description: List all sanctions alerts across all customers
      hints:
        readOnly: true
        openWorld: false
      call: fcm.list-all-sanction-alerts
      outputParameters:
      - type: object
        mapping: $.
    - name: scan-transaction-for-aml
      description: Scan a transaction message for AML indicators and suspicious patterns
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: fcm.scan-transaction-message
      outputParameters:
      - type: object
        mapping: $.
    - name: list-monitoring-alerts
      description: List open AML transaction monitoring alerts
      hints:
        readOnly: true
        openWorld: false
      call: fcm.list-monitoring-alerts
      outputParameters:
      - type: object
        mapping: $.
    - name: resolve-monitoring-alert
      description: Update the status or resolution of a monitoring alert
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: fcm.update-alert
      with:
        alertId: tools.alertId
      outputParameters:
      - type: object
        mapping: $.
    - name: get-customer-for-review
      description: Get customer profile for compliance review context
      hints:
        readOnly: true
        openWorld: false
      call: transact.get-customer
      with:
        customerId: tools.customerId
      outputParameters:
      - type: object
        mapping: $.

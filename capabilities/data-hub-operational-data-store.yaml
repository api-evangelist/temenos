naftiko: 1.0.0-alpha2
info:
  label: Temenos Transact Data Hub API — Operational Data Store
  description: 'Temenos Transact Data Hub API — Operational Data Store. 2 operations. Lead operation: List Operational Account
    Data. Self-contained Naftiko capability covering one Temenos business surface.'
  tags:
  - Temenos
  - Operational Data Store
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    TEMENOS_API_KEY: TEMENOS_API_KEY
capability:
  consumes:
  - type: http
    namespace: data-hub-operational-data-store
    baseUri: https://api.temenos.com/transact-data-hub/v1
    description: Temenos Transact Data Hub API — Operational Data Store business capability. Self-contained, no shared references.
    resources:
    - name: operational-accounts
      path: /operational/accounts
      operations:
      - name: listoperationalaccounts
        method: GET
        description: List Operational Account Data
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: operational-transactions
      path: /operational/transactions
      operations:
      - name: listoperationaltransactions
        method: GET
        description: List Operational Transaction Data
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: accountId
          in: query
          type: string
          description: Filter by account
    authentication:
      type: bearer
      token: '{{env.TEMENOS_API_KEY}}'
  exposes:
  - type: rest
    namespace: data-hub-operational-data-store-rest
    port: 8080
    description: REST adapter for Temenos Transact Data Hub API — Operational Data Store. One Spectral-compliant resource
      per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/operational/accounts
      name: operational-accounts
      description: REST surface for operational-accounts.
      operations:
      - method: GET
        name: listoperationalaccounts
        description: List Operational Account Data
        call: data-hub-operational-data-store.listoperationalaccounts
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/operational/transactions
      name: operational-transactions
      description: REST surface for operational-transactions.
      operations:
      - method: GET
        name: listoperationaltransactions
        description: List Operational Transaction Data
        call: data-hub-operational-data-store.listoperationaltransactions
        with:
          accountId: rest.accountId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: data-hub-operational-data-store-mcp
    port: 9090
    transport: http
    description: MCP adapter for Temenos Transact Data Hub API — Operational Data Store. One tool per consumed operation,
      routed inline through this capability's consumes block.
    tools:
    - name: list-operational-account-data
      description: List Operational Account Data
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: data-hub-operational-data-store.listoperationalaccounts
      outputParameters:
      - type: object
        mapping: $.
    - name: list-operational-transaction-data
      description: List Operational Transaction Data
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: data-hub-operational-data-store.listoperationaltransactions
      with:
        accountId: tools.accountId
      outputParameters:
      - type: object
        mapping: $.

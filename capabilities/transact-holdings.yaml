naftiko: 1.0.0-alpha2
info:
  label: Temenos Transact API — Holdings
  description: 'Temenos Transact API — Holdings. 9 operations. Lead operation: List Accounts. Self-contained Naftiko capability
    covering one Temenos business surface.'
  tags:
  - Temenos
  - Holdings
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    TEMENOS_API_KEY: TEMENOS_API_KEY
capability:
  consumes:
  - type: http
    namespace: transact-holdings
    baseUri: https://api.temenos.com/transact/v1
    description: Temenos Transact API — Holdings business capability. Self-contained, no shared references.
    resources:
    - name: holdings-accounts
      path: /holdings/accounts
      operations:
      - name: listaccounts
        method: GET
        description: List Accounts
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: customerId
          in: query
          type: string
          description: Filter accounts by customer identifier
        - name: accountType
          in: query
          type: string
          description: Filter by account type
      - name: createaccount
        method: POST
        description: Create Account Arrangement
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: holdings-accounts-accountId
      path: /holdings/accounts/{accountId}
      operations:
      - name: getaccount
        method: GET
        description: Get Account Details
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updateaccount
        method: PUT
        description: Update Account Arrangement
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: holdings-accounts-accountId-balances
      path: /holdings/accounts/{accountId}/balances
      operations:
      - name: getaccountbalances
        method: GET
        description: Get Account Balances
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: holdings-accounts-accountId-transactions
      path: /holdings/accounts/{accountId}/transactions
      operations:
      - name: listaccounttransactions
        method: GET
        description: List Account Transactions
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: dateFrom
          in: query
          type: string
          description: Start date for transaction filter in ISO 8601 format
        - name: dateTo
          in: query
          type: string
          description: End date for transaction filter in ISO 8601 format
        - name: transactionType
          in: query
          type: string
          description: Filter by transaction type
    - name: holdings-deposits
      path: /holdings/deposits
      operations:
      - name: listdeposits
        method: GET
        description: List Deposit Arrangements
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: customerId
          in: query
          type: string
          description: Filter deposits by customer identifier
    - name: holdings-loans
      path: /holdings/loans
      operations:
      - name: listloans
        method: GET
        description: List Loan Arrangements
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: customerId
          in: query
          type: string
          description: Filter loans by customer identifier
      - name: createloan
        method: POST
        description: Create Loan Arrangement
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.TEMENOS_API_KEY}}'

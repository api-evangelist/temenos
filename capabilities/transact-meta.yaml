naftiko: 1.0.0-alpha2
info:
  label: Temenos Transact API — Meta
  description: 'Temenos Transact API — Meta. 1 operations. Lead operation: List Available APIs. Self-contained Naftiko capability
    covering one Temenos business surface.'
  tags:
  - Temenos
  - Meta
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    TEMENOS_API_KEY: TEMENOS_API_KEY
capability:
  consumes:
  - type: http
    namespace: transact-meta
    baseUri: https://api.temenos.com/transact/v1
    description: Temenos Transact API — Meta business capability. Self-contained, no shared references.
    resources:
    - name: meta-apis
      path: /meta/apis
      operations:
      - name: listapis
        method: GET
        description: List Available APIs
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.TEMENOS_API_KEY}}'
  exposes:
  - type: rest
    namespace: transact-meta-rest
    port: 8080
    description: REST adapter for Temenos Transact API — Meta. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/meta/apis
      name: meta-apis
      description: REST surface for meta-apis.
      operations:
      - method: GET
        name: listapis
        description: List Available APIs
        call: transact-meta.listapis
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: transact-meta-mcp
    port: 9090
    transport: http
    description: MCP adapter for Temenos Transact API — Meta. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: list-available-apis
      description: List Available APIs
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: transact-meta.listapis
      outputParameters:
      - type: object
        mapping: $.

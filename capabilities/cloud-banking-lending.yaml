naftiko: 1.0.0-alpha2
info:
  label: Temenos Cloud Banking (CMB) API — Lending
  description: 'Temenos Cloud Banking (CMB) API — Lending. 2 operations. Lead operation: List Lending Facilities. Self-contained
    Naftiko capability covering one Temenos business surface.'
  tags:
  - Temenos
  - Lending
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    TEMENOS_API_KEY: TEMENOS_API_KEY
capability:
  consumes:
  - type: http
    namespace: cloud-banking-lending
    baseUri: https://api.temenos.com/cmb/v1
    description: Temenos Cloud Banking (CMB) API — Lending business capability. Self-contained, no shared references.
    resources:
    - name: lending-facilities
      path: /lending/facilities
      operations:
      - name: listlendingfacilities
        method: GET
        description: List Lending Facilities
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: customerId
          in: query
          type: string
          description: Filter by customer
      - name: createlendingfacility
        method: POST
        description: Create Lending Facility
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.TEMENOS_API_KEY}}'
  exposes:
  - type: rest
    namespace: cloud-banking-lending-rest
    port: 8080
    description: REST adapter for Temenos Cloud Banking (CMB) API — Lending. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/lending/facilities
      name: lending-facilities
      description: REST surface for lending-facilities.
      operations:
      - method: GET
        name: listlendingfacilities
        description: List Lending Facilities
        call: cloud-banking-lending.listlendingfacilities
        with:
          customerId: rest.customerId
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createlendingfacility
        description: Create Lending Facility
        call: cloud-banking-lending.createlendingfacility
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: cloud-banking-lending-mcp
    port: 9090
    transport: http
    description: MCP adapter for Temenos Cloud Banking (CMB) API — Lending. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: list-lending-facilities
      description: List Lending Facilities
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: cloud-banking-lending.listlendingfacilities
      with:
        customerId: tools.customerId
      outputParameters:
      - type: object
        mapping: $.
    - name: create-lending-facility
      description: Create Lending Facility
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: cloud-banking-lending.createlendingfacility
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.

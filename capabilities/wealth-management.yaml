naftiko: 1.0.0-alpha2
info:
  label: Temenos Wealth Management
  description: Integrated wealth management workflow combining the Temenos Wealth API and Transact API for portfolio management,
    securities trading, and client banking. Used by wealth managers and private bankers to manage client portfolios and execute
    investment strategies.
  tags:
  - Wealth Management
  - Portfolio Management
  - Securities Trading
  - Private Banking
  - Investment Management
  - Banking
  created: '2026-05-03'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    TEMENOS_WEALTH_TOKEN: TEMENOS_WEALTH_TOKEN
    TEMENOS_TRANSACT_TOKEN: TEMENOS_TRANSACT_TOKEN
capability:
  consumes:
  - type: http
    namespace: wealth
    baseUri: https://api.temenos.com/wealth/v1
    description: Temenos Wealth API for portfolio and securities management
    authentication:
      type: bearer
      token: '{{TEMENOS_WEALTH_TOKEN}}'
    resources:
    - name: portfolios
      path: /portfolios
      description: Investment portfolio management
      operations:
      - name: list-portfolios
        method: GET
        description: List investment portfolios
        inputParameters:
        - name: page_size
          in: query
          type: integer
          required: false
          description: Records per page
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-portfolio
        method: POST
        description: Create a new investment portfolio
        body:
          type: json
          data:
            clientId: '{{tools.clientId}}'
            portfolioName: '{{tools.portfolioName}}'
            currency: '{{tools.currency}}'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: portfolio-positions
      path: /portfolios/{portfolioId}/positions
      description: Portfolio holdings positions
      operations:
      - name: list-portfolio-positions
        method: GET
        description: List portfolio positions
        inputParameters:
        - name: portfolioId
          in: path
          type: string
          required: true
          description: Portfolio identifier
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: portfolio-valuation
      path: /portfolios/{portfolioId}/valuation
      description: Portfolio valuation
      operations:
      - name: get-portfolio-valuation
        method: GET
        description: Get portfolio valuation
        inputParameters:
        - name: portfolioId
          in: path
          type: string
          required: true
          description: Portfolio identifier
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: security-orders
      path: /orders/securities
      description: Securities order management
      operations:
      - name: list-security-orders
        method: GET
        description: List security orders
        inputParameters:
        - name: page_size
          in: query
          type: integer
          required: false
          description: Records per page
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-security-order
        method: POST
        description: Place a security order
        body:
          type: json
          data:
            portfolioId: '{{tools.portfolioId}}'
            securityId: '{{tools.securityId}}'
            orderType: '{{tools.orderType}}'
            quantity: '{{tools.quantity}}'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: cancel-security-order
        method: DELETE
        description: Cancel a security order
        inputParameters:
        - name: orderId
          in: path
          type: string
          required: true
          description: Order identifier
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: securities
      path: /securities
      description: Securities reference data
      operations:
      - name: list-securities
        method: GET
        description: List available securities
        inputParameters:
        - name: page_size
          in: query
          type: integer
          required: false
          description: Records per page
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  - type: http
    namespace: transact
    baseUri: https://api.temenos.com/transact/v1
    description: Temenos Transact core banking API
    authentication:
      type: bearer
      token: '{{TEMENOS_TRANSACT_TOKEN}}'
    resources:
    - name: accounts
      path: /holdings/accounts
      description: Customer account arrangements
      operations:
      - name: list-accounts
        method: GET
        description: List customer accounts with optional filtering
        inputParameters:
        - name: customerId
          in: query
          type: string
          required: false
          description: Filter accounts by customer identifier
        - name: accountType
          in: query
          type: string
          required: false
          description: Filter by account type (CURRENT, SAVINGS, DEPOSIT, LOAN)
        - name: page_size
          in: query
          type: integer
          required: false
          description: Number of records per page
        - name: page_start
          in: query
          type: integer
          required: false
          description: Starting record number
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-account
        method: POST
        description: Create a new account arrangement
        body:
          type: json
          data:
            customerId: '{{tools.customerId}}'
            accountType: '{{tools.accountType}}'
            currency: '{{tools.currency}}'
            productId: '{{tools.productId}}'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: account-detail
      path: /holdings/accounts/{accountId}
      description: Single account operations
      operations:
      - name: get-account
        method: GET
        description: Get account details
        inputParameters:
        - name: accountId
          in: path
          type: string
          required: true
          description: Unique account identifier
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: update-account
        method: PUT
        description: Update account arrangement
        inputParameters:
        - name: accountId
          in: path
          type: string
          required: true
          description: Unique account identifier
        body:
          type: json
          data:
            status: '{{tools.status}}'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: account-balances
      path: /holdings/accounts/{accountId}/balances
      description: Account balance information
      operations:
      - name: get-account-balances
        method: GET
        description: Get account balances
        inputParameters:
        - name: accountId
          in: path
          type: string
          required: true
          description: Unique account identifier
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: account-transactions
      path: /holdings/accounts/{accountId}/transactions
      description: Account transaction history
      operations:
      - name: list-account-transactions
        method: GET
        description: List account transactions
        inputParameters:
        - name: accountId
          in: path
          type: string
          required: true
          description: Unique account identifier
        - name: page_size
          in: query
          type: integer
          required: false
          description: Records per page
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: customers
      path: /party/customers
      description: Customer management
      operations:
      - name: list-customers
        method: GET
        description: List customers
        inputParameters:
        - name: page_size
          in: query
          type: integer
          required: false
          description: Records per page
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-customer
        method: POST
        description: Create new customer
        body:
          type: json
          data:
            firstName: '{{tools.firstName}}'
            lastName: '{{tools.lastName}}'
            customerType: '{{tools.customerType}}'
            email: '{{tools.email}}'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: customer-detail
      path: /party/customers/{customerId}
      description: Single customer operations
      operations:
      - name: get-customer
        method: GET
        description: Get customer details
        inputParameters:
        - name: customerId
          in: path
          type: string
          required: true
          description: Unique customer identifier
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: payment-orders
      path: /order/paymentOrders
      description: Payment order management
      operations:
      - name: list-payment-orders
        method: GET
        description: List payment orders
        inputParameters:
        - name: page_size
          in: query
          type: integer
          required: false
          description: Records per page
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-payment-order
        method: POST
        description: Create payment order
        body:
          type: json
          data:
            debitAccountId: '{{tools.debitAccountId}}'
            creditAccountId: '{{tools.creditAccountId}}'
            amount: '{{tools.amount}}'
            currency: '{{tools.currency}}'
            paymentType: '{{tools.paymentType}}'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    port: 8082
    namespace: wealth-management-api
    description: Unified REST API for Temenos wealth management operations.
    resources:
    - path: /v1/portfolios
      name: portfolios
      description: Investment portfolio management
      operations:
      - method: GET
        name: list-portfolios
        description: List investment portfolios
        call: wealth.list-portfolios
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: create-portfolio
        description: Create a new investment portfolio
        call: wealth.create-portfolio
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/portfolios/{portfolioId}/positions
      name: portfolio-positions
      description: Portfolio holdings positions
      operations:
      - method: GET
        name: list-positions
        description: List positions in a portfolio
        call: wealth.list-portfolio-positions
        with:
          portfolioId: rest.portfolioId
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/portfolios/{portfolioId}/valuation
      name: portfolio-valuation
      description: Portfolio valuation
      operations:
      - method: GET
        name: get-valuation
        description: Get portfolio valuation
        call: wealth.get-portfolio-valuation
        with:
          portfolioId: rest.portfolioId
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/securities
      name: securities
      description: Securities reference data
      operations:
      - method: GET
        name: list-securities
        description: List available securities
        call: wealth.list-securities
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/security-orders
      name: security-orders
      description: Securities order execution
      operations:
      - method: GET
        name: list-orders
        description: List security orders
        call: wealth.list-security-orders
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: place-order
        description: Place a security order
        call: wealth.create-security-order
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/clients
      name: wealth-clients
      description: Wealth management clients
      operations:
      - method: GET
        name: list-clients
        description: List wealth management clients
        call: wealth.list-wealth-clients
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/client-accounts
      name: client-accounts
      description: Client banking accounts (from Transact)
      operations:
      - method: GET
        name: list-accounts
        description: List client banking accounts
        call: transact.list-accounts
        with:
          customerId: rest.customerId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9092
    namespace: wealth-management-mcp
    transport: http
    description: MCP server for AI-assisted wealth management and portfolio operations.
    tools:
    - name: list-portfolios
      description: List investment portfolios for wealth clients
      hints:
        readOnly: true
        openWorld: false
      call: wealth.list-portfolios
      outputParameters:
      - type: object
        mapping: $.
    - name: create-portfolio
      description: Create a new investment portfolio for a client
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: wealth.create-portfolio
      outputParameters:
      - type: object
        mapping: $.
    - name: list-portfolio-positions
      description: List current holdings positions in a portfolio
      hints:
        readOnly: true
        openWorld: false
      call: wealth.list-portfolio-positions
      with:
        portfolioId: tools.portfolioId
      outputParameters:
      - type: object
        mapping: $.
    - name: get-portfolio-valuation
      description: Get the current market value and performance of a portfolio
      hints:
        readOnly: true
        openWorld: true
      call: wealth.get-portfolio-valuation
      with:
        portfolioId: tools.portfolioId
      outputParameters:
      - type: object
        mapping: $.
    - name: list-securities
      description: List available securities for investment
      hints:
        readOnly: true
        openWorld: true
      call: wealth.list-securities
      outputParameters:
      - type: object
        mapping: $.
    - name: place-security-order
      description: Place a buy or sell order for a security
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: wealth.create-security-order
      outputParameters:
      - type: object
        mapping: $.
    - name: cancel-security-order
      description: Cancel a pending securities order
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: wealth.cancel-security-order
      with:
        orderId: tools.orderId
      outputParameters:
      - type: object
        mapping: $.
    - name: list-security-orders
      description: List pending and executed security orders
      hints:
        readOnly: true
        openWorld: false
      call: wealth.list-security-orders
      outputParameters:
      - type: object
        mapping: $.
    - name: list-client-accounts
      description: List banking accounts associated with a wealth client
      hints:
        readOnly: true
        openWorld: false
      call: transact.list-accounts
      with:
        customerId: tools.customerId
      outputParameters:
      - type: object
        mapping: $.
    - name: get-client-account-balances
      description: Get account balances for a wealth client's banking account
      hints:
        readOnly: true
        openWorld: false
      call: transact.get-account-balances
      with:
        accountId: tools.accountId
      outputParameters:
      - type: object
        mapping: $.

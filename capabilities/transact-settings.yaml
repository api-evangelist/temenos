naftiko: 1.0.0-alpha2
info:
  label: Temenos Transact API — Settings
  description: 'Temenos Transact API — Settings. 1 operations. Lead operation: List System Configurations. Self-contained
    Naftiko capability covering one Temenos business surface.'
  tags:
  - Temenos
  - Settings
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    TEMENOS_API_KEY: TEMENOS_API_KEY
capability:
  consumes:
  - type: http
    namespace: transact-settings
    baseUri: https://api.temenos.com/transact/v1
    description: Temenos Transact API — Settings business capability. Self-contained, no shared references.
    resources:
    - name: settings-configurations
      path: /settings/configurations
      operations:
      - name: listconfigurations
        method: GET
        description: List System Configurations
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.TEMENOS_API_KEY}}'
  exposes:
  - type: rest
    namespace: transact-settings-rest
    port: 8080
    description: REST adapter for Temenos Transact API — Settings. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/settings/configurations
      name: settings-configurations
      description: REST surface for settings-configurations.
      operations:
      - method: GET
        name: listconfigurations
        description: List System Configurations
        call: transact-settings.listconfigurations
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: transact-settings-mcp
    port: 9090
    transport: http
    description: MCP adapter for Temenos Transact API — Settings. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: list-system-configurations
      description: List System Configurations
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: transact-settings.listconfigurations
      outputParameters:
      - type: object
        mapping: $.

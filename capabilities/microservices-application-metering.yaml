naftiko: 1.0.0-alpha2
info:
  label: Temenos Transact Microservices API — Application Metering
  description: 'Temenos Transact Microservices API — Application Metering. 1 operations. Lead operation: List Metering Records.
    Self-contained Naftiko capability covering one Temenos business surface.'
  tags:
  - Temenos
  - Application Metering
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    TEMENOS_API_KEY: TEMENOS_API_KEY
capability:
  consumes:
  - type: http
    namespace: microservices-application-metering
    baseUri: https://api.temenos.com/transact/microservices/v1
    description: Temenos Transact Microservices API — Application Metering business capability. Self-contained, no shared
      references.
    resources:
    - name: metering-records
      path: /metering/records
      operations:
      - name: listmeteringrecords
        method: GET
        description: List Metering Records
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: dateFrom
          in: query
          type: string
          description: Start date
        - name: dateTo
          in: query
          type: string
          description: End date
    authentication:
      type: bearer
      token: '{{env.TEMENOS_API_KEY}}'
  exposes:
  - type: rest
    namespace: microservices-application-metering-rest
    port: 8080
    description: REST adapter for Temenos Transact Microservices API — Application Metering. One Spectral-compliant resource
      per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/metering/records
      name: metering-records
      description: REST surface for metering-records.
      operations:
      - method: GET
        name: listmeteringrecords
        description: List Metering Records
        call: microservices-application-metering.listmeteringrecords
        with:
          dateFrom: rest.dateFrom
          dateTo: rest.dateTo
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: microservices-application-metering-mcp
    port: 9090
    transport: http
    description: MCP adapter for Temenos Transact Microservices API — Application Metering. One tool per consumed operation,
      routed inline through this capability's consumes block.
    tools:
    - name: list-metering-records
      description: List Metering Records
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: microservices-application-metering.listmeteringrecords
      with:
        dateFrom: tools.dateFrom
        dateTo: tools.dateTo
      outputParameters:
      - type: object
        mapping: $.

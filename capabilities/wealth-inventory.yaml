naftiko: 1.0.0-alpha2
info:
  label: Temenos Wealth API — Inventory
  description: 'Temenos Wealth API — Inventory. 1 operations. Lead operation: List Securities. Self-contained Naftiko capability
    covering one Temenos business surface.'
  tags:
  - Temenos
  - Inventory
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    TEMENOS_API_KEY: TEMENOS_API_KEY
capability:
  consumes:
  - type: http
    namespace: wealth-inventory
    baseUri: https://api.temenos.com/wealth/v1
    description: Temenos Wealth API — Inventory business capability. Self-contained, no shared references.
    resources:
    - name: inventory-securities
      path: /inventory/securities
      operations:
      - name: listsecurities
        method: GET
        description: List Securities
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: assetClass
          in: query
          type: string
          description: Filter by asset class
        - name: exchange
          in: query
          type: string
          description: Filter by exchange
    authentication:
      type: bearer
      token: '{{env.TEMENOS_API_KEY}}'
  exposes:
  - type: rest
    namespace: wealth-inventory-rest
    port: 8080
    description: REST adapter for Temenos Wealth API — Inventory. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/inventory/securities
      name: inventory-securities
      description: REST surface for inventory-securities.
      operations:
      - method: GET
        name: listsecurities
        description: List Securities
        call: wealth-inventory.listsecurities
        with:
          assetClass: rest.assetClass
          exchange: rest.exchange
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: wealth-inventory-mcp
    port: 9090
    transport: http
    description: MCP adapter for Temenos Wealth API — Inventory. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: list-securities
      description: List Securities
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: wealth-inventory.listsecurities
      with:
        assetClass: tools.assetClass
        exchange: tools.exchange
      outputParameters:
      - type: object
        mapping: $.

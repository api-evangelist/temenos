naftiko: 1.0.0-alpha2
info:
  label: Temenos Financial Crime Mitigation API — Transaction Monitoring
  description: 'Temenos Financial Crime Mitigation API — Transaction Monitoring. 1 operations. Lead operation: List Transaction
    Monitoring Alerts. Self-contained Naftiko capability covering one Temenos business surface.'
  tags:
  - Temenos
  - Transaction Monitoring
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    TEMENOS_API_KEY: TEMENOS_API_KEY
capability:
  consumes:
  - type: http
    namespace: financial-crime-mitigation-transaction-monitoring
    baseUri: https://api.temenos.com/fcm/v1
    description: Temenos Financial Crime Mitigation API — Transaction Monitoring business capability. Self-contained, no shared
      references.
    resources:
    - name: monitoring-alerts
      path: /monitoring/alerts
      operations:
      - name: listmonitoringalerts
        method: GET
        description: List Transaction Monitoring Alerts
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: status
          in: query
          type: string
          description: Filter by alert status
        - name: ruleId
          in: query
          type: string
          description: Filter by monitoring rule identifier
    authentication:
      type: bearer
      token: '{{env.TEMENOS_API_KEY}}'
  exposes:
  - type: rest
    namespace: financial-crime-mitigation-transaction-monitoring-rest
    port: 8080
    description: REST adapter for Temenos Financial Crime Mitigation API — Transaction Monitoring. One Spectral-compliant
      resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/monitoring/alerts
      name: monitoring-alerts
      description: REST surface for monitoring-alerts.
      operations:
      - method: GET
        name: listmonitoringalerts
        description: List Transaction Monitoring Alerts
        call: financial-crime-mitigation-transaction-monitoring.listmonitoringalerts
        with:
          status: rest.status
          ruleId: rest.ruleId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: financial-crime-mitigation-transaction-monitoring-mcp
    port: 9090
    transport: http
    description: MCP adapter for Temenos Financial Crime Mitigation API — Transaction Monitoring. One tool per consumed operation,
      routed inline through this capability's consumes block.
    tools:
    - name: list-transaction-monitoring-alerts
      description: List Transaction Monitoring Alerts
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: financial-crime-mitigation-transaction-monitoring.listmonitoringalerts
      with:
        status: tools.status
        ruleId: tools.ruleId
      outputParameters:
      - type: object
        mapping: $.

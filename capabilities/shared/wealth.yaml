naftiko: "1.0.0-alpha1"

info:
  label: "Temenos Wealth API"
  description: "Portfolio management and securities trading platform APIs for wealth managers and private bankers covering portfolios, orders, clients, securities, and markets."
  tags:
    - Wealth Management
    - Portfolio Management
    - Securities Trading
    - Private Banking
    - Investment Management
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      TEMENOS_WEALTH_TOKEN: TEMENOS_WEALTH_TOKEN

capability:
  consumes:
    - type: http
      namespace: wealth
      baseUri: https://api.temenos.com/wealth/v1
      description: "Temenos Wealth API for portfolio and securities management"
      authentication:
        type: bearer
        token: "{{TEMENOS_WEALTH_TOKEN}}"
      resources:
        - name: portfolios
          path: /portfolios
          description: "Investment portfolio management"
          operations:
            - name: list-portfolios
              method: GET
              description: "List investment portfolios"
              inputParameters:
                - name: page_size
                  in: query
                  type: integer
                  required: false
                  description: "Records per page"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-portfolio
              method: POST
              description: "Create a new investment portfolio"
              body:
                type: json
                data:
                  clientId: "{{tools.clientId}}"
                  portfolioName: "{{tools.portfolioName}}"
                  currency: "{{tools.currency}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: portfolio-positions
          path: /portfolios/{portfolioId}/positions
          description: "Portfolio holdings positions"
          operations:
            - name: list-portfolio-positions
              method: GET
              description: "List portfolio positions"
              inputParameters:
                - name: portfolioId
                  in: path
                  type: string
                  required: true
                  description: "Portfolio identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: portfolio-valuation
          path: /portfolios/{portfolioId}/valuation
          description: "Portfolio valuation"
          operations:
            - name: get-portfolio-valuation
              method: GET
              description: "Get portfolio valuation"
              inputParameters:
                - name: portfolioId
                  in: path
                  type: string
                  required: true
                  description: "Portfolio identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: security-orders
          path: /orders/securities
          description: "Securities order management"
          operations:
            - name: list-security-orders
              method: GET
              description: "List security orders"
              inputParameters:
                - name: page_size
                  in: query
                  type: integer
                  required: false
                  description: "Records per page"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-security-order
              method: POST
              description: "Place a security order"
              body:
                type: json
                data:
                  portfolioId: "{{tools.portfolioId}}"
                  securityId: "{{tools.securityId}}"
                  orderType: "{{tools.orderType}}"
                  quantity: "{{tools.quantity}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: cancel-security-order
              method: DELETE
              description: "Cancel a security order"
              inputParameters:
                - name: orderId
                  in: path
                  type: string
                  required: true
                  description: "Order identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: securities
          path: /securities
          description: "Securities reference data"
          operations:
            - name: list-securities
              method: GET
              description: "List available securities"
              inputParameters:
                - name: page_size
                  in: query
                  type: integer
                  required: false
                  description: "Records per page"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8103
      namespace: wealth-api
      resources:
        - path: /v1/portfolios
          name: portfolios
          description: "Investment portfolios"
          operations:
            - method: GET
              name: list-portfolios
              description: "List portfolios"
              call: "wealth.list-portfolios"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9103
      namespace: wealth-mcp
      transport: http
      tools:
        - name: list-portfolios
          description: "List wealth management portfolios"
          hints:
            readOnly: true
            openWorld: false
          call: "wealth.list-portfolios"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-portfolio-valuation
          description: "Get current portfolio valuation"
          hints:
            readOnly: true
            openWorld: false
          call: "wealth.get-portfolio-valuation"
          outputParameters:
            - type: object
              mapping: "$."
        - name: place-security-order
          description: "Place a buy or sell security order"
          hints:
            readOnly: false
            destructive: false
            idempotent: false
          call: "wealth.create-security-order"
          outputParameters:
            - type: object
              mapping: "$."

naftiko: "1.0.0-alpha1"

info:
  label: "Temenos Transact API"
  description: "Core banking system API for managing accounts, transactions, customers, loans, and payment orders across retail, corporate, wealth, treasury, and Islamic banking."
  tags:
    - Banking
    - Core Banking
    - Accounts
    - Transactions
    - Loans
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      TEMENOS_TRANSACT_TOKEN: TEMENOS_TRANSACT_TOKEN

capability:
  consumes:
    - type: http
      namespace: transact
      baseUri: https://api.temenos.com/transact/v1
      description: "Temenos Transact core banking API"
      authentication:
        type: bearer
        token: "{{TEMENOS_TRANSACT_TOKEN}}"
      resources:
        - name: accounts
          path: /holdings/accounts
          description: "Customer account arrangements"
          operations:
            - name: list-accounts
              method: GET
              description: "List customer accounts with optional filtering"
              inputParameters:
                - name: customerId
                  in: query
                  type: string
                  required: false
                  description: "Filter accounts by customer identifier"
                - name: accountType
                  in: query
                  type: string
                  required: false
                  description: "Filter by account type (CURRENT, SAVINGS, DEPOSIT, LOAN)"
                - name: page_size
                  in: query
                  type: integer
                  required: false
                  description: "Number of records per page"
                - name: page_start
                  in: query
                  type: integer
                  required: false
                  description: "Starting record number"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-account
              method: POST
              description: "Create a new account arrangement"
              body:
                type: json
                data:
                  customerId: "{{tools.customerId}}"
                  accountType: "{{tools.accountType}}"
                  currency: "{{tools.currency}}"
                  productId: "{{tools.productId}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: account-detail
          path: /holdings/accounts/{accountId}
          description: "Single account operations"
          operations:
            - name: get-account
              method: GET
              description: "Get account details"
              inputParameters:
                - name: accountId
                  in: path
                  type: string
                  required: true
                  description: "Unique account identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: update-account
              method: PUT
              description: "Update account arrangement"
              inputParameters:
                - name: accountId
                  in: path
                  type: string
                  required: true
                  description: "Unique account identifier"
              body:
                type: json
                data:
                  status: "{{tools.status}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: account-balances
          path: /holdings/accounts/{accountId}/balances
          description: "Account balance information"
          operations:
            - name: get-account-balances
              method: GET
              description: "Get account balances"
              inputParameters:
                - name: accountId
                  in: path
                  type: string
                  required: true
                  description: "Unique account identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: account-transactions
          path: /holdings/accounts/{accountId}/transactions
          description: "Account transaction history"
          operations:
            - name: list-account-transactions
              method: GET
              description: "List account transactions"
              inputParameters:
                - name: accountId
                  in: path
                  type: string
                  required: true
                  description: "Unique account identifier"
                - name: page_size
                  in: query
                  type: integer
                  required: false
                  description: "Records per page"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: customers
          path: /party/customers
          description: "Customer management"
          operations:
            - name: list-customers
              method: GET
              description: "List customers"
              inputParameters:
                - name: page_size
                  in: query
                  type: integer
                  required: false
                  description: "Records per page"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-customer
              method: POST
              description: "Create new customer"
              body:
                type: json
                data:
                  firstName: "{{tools.firstName}}"
                  lastName: "{{tools.lastName}}"
                  customerType: "{{tools.customerType}}"
                  email: "{{tools.email}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: customer-detail
          path: /party/customers/{customerId}
          description: "Single customer operations"
          operations:
            - name: get-customer
              method: GET
              description: "Get customer details"
              inputParameters:
                - name: customerId
                  in: path
                  type: string
                  required: true
                  description: "Unique customer identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: payment-orders
          path: /order/paymentOrders
          description: "Payment order management"
          operations:
            - name: list-payment-orders
              method: GET
              description: "List payment orders"
              inputParameters:
                - name: page_size
                  in: query
                  type: integer
                  required: false
                  description: "Records per page"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-payment-order
              method: POST
              description: "Create payment order"
              body:
                type: json
                data:
                  debitAccountId: "{{tools.debitAccountId}}"
                  creditAccountId: "{{tools.creditAccountId}}"
                  amount: "{{tools.amount}}"
                  currency: "{{tools.currency}}"
                  paymentType: "{{tools.paymentType}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: transact-api
      resources:
        - path: /v1/accounts
          name: accounts
          description: "Account management"
          operations:
            - method: GET
              name: list-accounts
              description: "List accounts"
              call: "transact.list-accounts"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create-account
              description: "Create account"
              call: "transact.create-account"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: transact-mcp
      transport: http
      tools:
        - name: list-accounts
          description: "List banking accounts for a customer"
          hints:
            readOnly: true
            openWorld: false
          call: "transact.list-accounts"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-payment-order
          description: "Create a payment order"
          hints:
            readOnly: false
            destructive: false
            idempotent: false
          call: "transact.create-payment-order"
          outputParameters:
            - type: object
              mapping: "$."

naftiko: "1.0.0-alpha1"

info:
  label: "Temenos Payments API"
  description: "Payment processing and management API supporting SEPA, SWIFT, PSD2, bulk payments, direct debits, standing orders, and request-to-pay."
  tags:
    - Payments
    - SEPA
    - SWIFT
    - PSD2
    - Banking
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      TEMENOS_PAYMENTS_TOKEN: TEMENOS_PAYMENTS_TOKEN

capability:
  consumes:
    - type: http
      namespace: payments
      baseUri: https://api.temenos.com/payments/v1
      description: "Temenos Payments API for multi-type payment processing"
      authentication:
        type: bearer
        token: "{{TEMENOS_PAYMENTS_TOKEN}}"
      resources:
        - name: payment-orders
          path: /paymentOrders
          description: "Payment order initiation and management"
          operations:
            - name: list-payment-orders
              method: GET
              description: "List payment orders"
              inputParameters:
                - name: status
                  in: query
                  type: string
                  required: false
                  description: "Filter by status"
                - name: paymentType
                  in: query
                  type: string
                  required: false
                  description: "Filter by payment type"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-payment-order
              method: POST
              description: "Initiate a payment order"
              body:
                type: json
                data:
                  debitAccountId: "{{tools.debitAccountId}}"
                  amount: "{{tools.amount}}"
                  currency: "{{tools.currency}}"
                  paymentType: "{{tools.paymentType}}"
                  beneficiary: "{{tools.beneficiary}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: bulk-payments
          path: /bulkPayments
          description: "Bulk payment file processing"
          operations:
            - name: list-bulk-payments
              method: GET
              description: "List bulk payment batches"
              inputParameters:
                - name: page_size
                  in: query
                  type: integer
                  required: false
                  description: "Records per page"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-bulk-payment
              method: POST
              description: "Create a bulk payment batch"
              body:
                type: json
                data:
                  batchReference: "{{tools.batchReference}}"
                  debitAccountId: "{{tools.debitAccountId}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: standing-orders
          path: /standingOrders
          description: "Recurring payment standing orders"
          operations:
            - name: list-standing-orders
              method: GET
              description: "List standing orders"
              inputParameters:
                - name: page_size
                  in: query
                  type: integer
                  required: false
                  description: "Records per page"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-standing-order
              method: POST
              description: "Create a standing order"
              body:
                type: json
                data:
                  debitAccountId: "{{tools.debitAccountId}}"
                  amount: "{{tools.amount}}"
                  frequency: "{{tools.frequency}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: direct-debits
          path: /directDebits
          description: "Direct debit mandate management"
          operations:
            - name: list-direct-debits
              method: GET
              description: "List direct debit mandates"
              inputParameters:
                - name: page_size
                  in: query
                  type: integer
                  required: false
                  description: "Records per page"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8101
      namespace: payments-api
      resources:
        - path: /v1/payment-orders
          name: payment-orders
          description: "Payment orders"
          operations:
            - method: GET
              name: list-payment-orders
              description: "List payment orders"
              call: "payments.list-payment-orders"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create-payment-order
              description: "Create payment order"
              call: "payments.create-payment-order"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9101
      namespace: payments-mcp
      transport: http
      tools:
        - name: list-payment-orders
          description: "List payment orders"
          hints:
            readOnly: true
            openWorld: false
          call: "payments.list-payment-orders"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-sepa-payment
          description: "Create a SEPA payment order"
          hints:
            readOnly: false
            destructive: false
            idempotent: false
          call: "payments.create-payment-order"
          with:
            paymentType: "SEPA_CREDIT"
          outputParameters:
            - type: object
              mapping: "$."

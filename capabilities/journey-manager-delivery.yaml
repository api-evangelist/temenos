naftiko: 1.0.0-alpha2
info:
  label: Temenos Journey Manager API — Delivery
  description: 'Temenos Journey Manager API — Delivery. 3 operations. Lead operation: List Submissions. Self-contained Naftiko
    capability covering one Temenos business surface.'
  tags:
  - Temenos
  - Delivery
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    TEMENOS_API_KEY: TEMENOS_API_KEY
capability:
  consumes:
  - type: http
    namespace: journey-manager-delivery
    baseUri: https://journey.temenos.com/api/v1
    description: Temenos Journey Manager API — Delivery business capability. Self-contained, no shared references.
    resources:
    - name: delivery-submissions
      path: /delivery/submissions
      operations:
      - name: listsubmissions
        method: GET
        description: List Submissions
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: delivery-submissions-submissionId
      path: /delivery/submissions/{submissionId}
      operations:
      - name: getsubmission
        method: GET
        description: Get Submission Details
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: submissionId
          in: path
          type: string
          description: Submission identifier
          required: true
    - name: delivery-submissions-submissionId-complete
      path: /delivery/submissions/{submissionId}/complete
      operations:
      - name: completedelivery
        method: POST
        description: Complete Delivery
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: submissionId
          in: path
          type: string
          description: Submission identifier
          required: true
    authentication:
      type: bearer
      token: '{{env.TEMENOS_API_KEY}}'
  exposes:
  - type: rest
    namespace: journey-manager-delivery-rest
    port: 8080
    description: REST adapter for Temenos Journey Manager API — Delivery. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/delivery/submissions
      name: delivery-submissions
      description: REST surface for delivery-submissions.
      operations:
      - method: GET
        name: listsubmissions
        description: List Submissions
        call: journey-manager-delivery.listsubmissions
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/delivery/submissions/{submissionid}
      name: delivery-submissions-submissionid
      description: REST surface for delivery-submissions-submissionId.
      operations:
      - method: GET
        name: getsubmission
        description: Get Submission Details
        call: journey-manager-delivery.getsubmission
        with:
          submissionId: rest.submissionId
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/delivery/submissions/{submissionid}/complete
      name: delivery-submissions-submissionid-complete
      description: REST surface for delivery-submissions-submissionId-complete.
      operations:
      - method: POST
        name: completedelivery
        description: Complete Delivery
        call: journey-manager-delivery.completedelivery
        with:
          submissionId: rest.submissionId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: journey-manager-delivery-mcp
    port: 9090
    transport: http
    description: MCP adapter for Temenos Journey Manager API — Delivery. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: list-submissions
      description: List Submissions
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: journey-manager-delivery.listsubmissions
      outputParameters:
      - type: object
        mapping: $.
    - name: get-submission-details
      description: Get Submission Details
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: journey-manager-delivery.getsubmission
      with:
        submissionId: tools.submissionId
      outputParameters:
      - type: object
        mapping: $.
    - name: complete-delivery
      description: Complete Delivery
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: journey-manager-delivery.completedelivery
      with:
        submissionId: tools.submissionId
      outputParameters:
      - type: object
        mapping: $.

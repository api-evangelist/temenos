specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Temenos
providerId: temenos
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - FinOps
  - FOCUS
  - Core Banking
  - Financial Services
description: >-
  FOCUS-aligned FinOps scaffold for Temenos. Temenos sells software licenses and SaaS subscriptions to
  financial institutions; commercial terms are sales-led and there is no public usage-based price list
  to map to FOCUS columns until a deployment is in place.
sources:
  - https://www.temenos.com/products/
  - https://www.temenos.com/contact/
  - https://focus.finops.org/focus-specification/v1-3/
notes: >-
  No public usage telemetry or programmatic billing surface. Reconciliation is deployment-specific.
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Temenos AG
serviceCategory: Banking Software
billingModel:
  pricingCategory: Subscription
  billingFrequency: Per-Invoice
  billingCurrency: USD
  chargeCategories:
    - Purchase
focusColumns:
  ServiceName: Temenos
  ServiceCategory: Banking Software
  ProviderName: Temenos
  PublisherName: Temenos AG
  InvoiceIssuerName: Temenos AG
  BillingCurrency: USD
meters:
  - name: license_fees
    unit: varies
    aggregation: sum
    dimensions:
      - module
      - deployment_model
principles:
  - name: Visibility
    description: Temenos invoices and the bank's internal cost-allocation systems are the primary visibility
      surface; no shared multi-tenant usage API is published.
  - name: Allocation
    description: Allocate license / SaaS spend across bank business units (retail, corporate, wealth) based
      on the modules each unit consumes per the master agreement.
  - name: Optimization
    description: Right-size deployment topology, retire unused modules at renewal, and consolidate environments
      to reduce non-prod license footprint.
  - name: Accountability
    description: Bank CIO / core banking program owner is accountable for Temenos spend and reviews growth
      against the contractual baseline at renewal.
maintainers:

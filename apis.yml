- name: Temenos Transact Microservices API
  description: >-
    Cloud-native microservices APIs for Temenos Transact, providing callback
    registry for long-running transactions, event store for business and system
    events, configuration management, user entitlements, service orchestration,
    application metering, and traceability for non-repudiation across all API
    services.

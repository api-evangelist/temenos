- name: Temenos Explorer API
  description: >-
    APIs for the Temenos Explorer framework, providing an API gateway for
    server-to-server API calls with Keycloak-based authentication, plugin
    development methods, and customizable banking solution exploration
    interfaces. Handles authentication, roles, permissions, and CORS management
    for banking application integration.
  image: https://www.temenos.com/wp-content/uploads/2025/04/Temenos_Logo.png

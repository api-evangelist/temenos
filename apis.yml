- name: Temenos Buy Now Pay Later API
  description: >-
    APIs for buy now pay later services with embedded Explainable AI for
    automated decisioning and credit offer matching. Supports interest-free and
    interest-bearing BNPL products with point-of-sale integration and full loan
    lifecycle management. Core banking agnostic and deployable on Temenos
    Banking Cloud.
  image: https://www.temenos.com/wp-content/uploads/2025/04/Temenos_Logo.png
  humanURL: https://developer.temenos.com/service/buy-now-pay-later

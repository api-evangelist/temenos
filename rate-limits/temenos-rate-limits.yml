specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Temenos
providerId: temenos
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Rate Limiting
  - Core Banking
  - Financial Services
description: >-
  Temenos APIs are delivered as part of bank-deployed products (on-premise / private cloud / SaaS); rate
  limits are governed by the customer's deployment topology and service contract rather than a public
  shared-tenancy quota. There is no public Temenos rate-limits reference for general developers.
sources:
  - https://www.temenos.com/products/
  - https://www.temenos.com/contact/
notes: >-
  No public rate-limits documentation. Limits are defined per Temenos deployment / contract.
responseCodes: {}
limits:
  - name: Deployment-Defined
    scope: contract
    metric: varies
    limit: defined per Temenos deployment / customer contract
policies:
  - name: Deployment Capacity
    description: Throughput depends on the bank's chosen deployment (on-prem hardware, dedicated cloud,
      or Temenos Banking Cloud SaaS) and the sizing agreed with Temenos.
